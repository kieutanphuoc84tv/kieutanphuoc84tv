# .github/workflows/snake.yml
name: Generate Snake

on:
  schedule:
    # Chạy vào 00:00 UTC mỗi ngày
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # BỔ SUNG QUYỀN TRUY CẬP (Rất quan trọng để tạo/cập nhật branch 'dist')
    permissions: 
      contents: write
      
    steps:
      - uses: actions/checkout@v2
      
      # BƯỚC 1: Tạo file SVG thường (light mode)
      - uses: platane/snk@master
        id: snake-svg-light
        with:
          github_user_name: kietuanphuoc84tv # <-- Đã điền đúng username của bạn
          # Dùng biến svg_out_path thay cho outputs đã bị lỗi
          svg_out_path: dist/github-contribution-grid-snake.svg

      # BƯỚC 2: Tạo file SVG dark-mode
      - uses: platane/snk@master
        id: snake-svg-dark
        with:
          github_user_name: kietuanphuoc84tv # <-- Đã điền đúng username của bạn
          # Cấu hình màu dark mode
          color_palette: github-dark 
          # Dùng biến svg_out_path thay cho outputs đã bị lỗi
          svg_out_path: dist/github-contribution-grid-snake-dark.svg

      # BƯỚC 3: Đẩy các file SVG đã tạo lên branch 'dist'
      - uses: crazy-max/ghaction-github-pages@v2
        with:
          target_branch: dist
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
